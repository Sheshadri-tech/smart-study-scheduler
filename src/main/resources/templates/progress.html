<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Progress Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Progress Tracker</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">Study Progress Tracker</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Total Topics</h5>
                    <h2 th:text="${totalTopics}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Completed Topics</h5>
                    <h2 th:text="${completedTopics}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h5>Pending Topics</h5>
                    <h2 th:text="${pendingTopics}"></h2>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow mt-4">
        <div class="card-body">
            <h4>Overall Progress</h4>

            <h2>
                <span th:text="${progressPercent}"></span>%
            </h2>

            <div class="progress" style="height: 30px;">
                <div class="progress-bar"
                     role="progressbar"
                     th:style="'width:' + ${progressPercent} + '%'"
                     th:text="${progressPercent} + '%'">
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
