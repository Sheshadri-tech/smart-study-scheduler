<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Subject Manager</title>
</head>
<body>

<h1>Subject Manager</h1>

<form action="/subjects/add" method="post">
    <input type="text" name="subjectName" placeholder="Subject Name" required>
    <input type="text" name="description" placeholder="Description" required>
    <button type="submit">Add Subject</button>
</form>

<h2>All Subjects</h2>

<ul>
    <li th:each="subject : ${subjects}">
        <span th:text="${subject.subjectName}"></span> -
        <span th:text="${subject.description}"></span>

        |

        <a th:href="@{/subjects/delete/{id}(id=${subject.id})}">
            Delete
        </a>
    </li>
</ul>

<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
