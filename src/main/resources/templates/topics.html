<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Topic Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Topic Manager</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow mb-4">
        <div class="card-header bg-success text-white">
            <h4>Add New Topic</h4>
        </div>

        <div class="card-body">
            <form action="/topics/add" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Topic Name</label>
                        <input type="text" name="topicName" class="form-control" placeholder="Enter topic name" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select" required>
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Difficulty Level</label>
                        <select name="difficultyLevel" class="form-select" required>
                            <option value="1">1 - Easy</option>
                            <option value="2">2 - Basic</option>
                            <option value="3">3 - Medium</option>
                            <option value="4">4 - Hard</option>
                            <option value="5">5 - Very Hard</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estimated Hours</label>
                        <input type="number" name="estimatedHours" class="form-control" min="1" placeholder="Enter estimated hours" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Target Completion Date</label>
                        <input type="date" name="targetCompletionDate" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Subject</label>
                        <select name="subjectId" class="form-select" required>
                            <option th:each="subject : ${subjects}"
                                    th:value="${subject.id}"
                                    th:text="${subject.subjectName}">
                            </option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-success">Add Topic</button>

            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4>All Topics</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Topic</th>
                        <th>Status</th>
                        <th>Difficulty</th>
                        <th>Estimated Hours</th>
                        <th>Target Date</th>
                        <th>Priority Score</th>
                        <th>Subject</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="topic : ${topics}">
                        <td th:text="${topic.topicName}"></td>
                        <td th:text="${topic.status}"></td>
                        <td th:text="${topic.difficultyLevel}"></td>
                        <td th:text="${topic.estimatedHours}"></td>
                        <td th:text="${topic.targetCompletionDate}"></td>
                        <td th:text="${topic.priorityScore}"></td>
                        <td th:text="${topic.subject != null ? topic.subject.subjectName : 'No Subject'}"></td>
                        <td>
                            <a th:href="@{/topics/delete/{id}(id=${topic.id})}" class="btn btn-danger btn-sm">
                                Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
