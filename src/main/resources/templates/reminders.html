<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reminder Panel</title>
</head>
<body>

<h1>Reminder / Notification Panel</h1>

<form action="/reminders/add" method="post">
    <input type="text" name="title" placeholder="Reminder Title" required>
    <input type="date" name="reminderDate" required>
    <input type="time" name="reminderTime" required>
    <input type="text" name="message" placeholder="Message" required>
    <button type="submit">Add Reminder</button>
</form>

<h2>All Reminders</h2>

<ul>
    <li th:each="reminder : ${reminders}">
        <span th:text="${reminder.title}"></span> |
        <span th:text="${reminder.reminderDate}"></span> |
        <span th:text="${reminder.reminderTime}"></span> |
        <span th:text="${reminder.message}"></span>

        |

        <a th:href="@{/reminders/delete/{id}(id=${reminder.id})}">
            Delete
        </a>
    </li>
</ul>

<a href="/dashboard">Back to Dashboard</a>

</body>
</html>
