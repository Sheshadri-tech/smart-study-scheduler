<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reminder Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Reminder / Notification Panel</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow mb-4">
        <div class="card-header bg-info text-white">
            <h4>Add Study Reminder</h4>
        </div>

        <div class="card-body">
            <form action="/reminders/add" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Reminder Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Enter reminder title" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Reminder Date</label>
                        <input type="date" name="reminderDate" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Reminder Time</label>
                        <input type="time" name="reminderTime" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Message</label>
                        <input type="text" name="message" class="form-control" placeholder="Enter reminder message" required>
                    </div>

                </div>

                <button type="submit" class="btn btn-info text-white">Add Reminder</button>

            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4>All Reminders</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Message</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="reminder : ${reminders}">
                        <td th:text="${reminder.title}"></td>
                        <td th:text="${reminder.reminderDate}"></td>
                        <td th:text="${reminder.reminderTime}"></td>
                        <td th:text="${reminder.message}"></td>
                        <td>
                            <a th:href="@{/reminders/delete/{id}(id=${reminder.id})}" class="btn btn-danger btn-sm">
                                Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
