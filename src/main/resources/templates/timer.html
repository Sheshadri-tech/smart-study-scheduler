<!DOCTYPE html>
<html>
<head>
    <title>Pomodoro Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Pomodoro Study Timer</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow text-center">
        <div class="card-body">

            <h1 class="mb-4">Pomodoro Study Timer</h1>

            <h1 id="timer" class="display-1 fw-bold text-primary">25:00</h1>

            <p class="text-muted">
                Focus for 25 minutes, then take a short break.
            </p>

            <button onclick="startTimer()" class="btn btn-success btn-lg m-2">
                Start
            </button>

            <button onclick="pauseTimer()" class="btn btn-warning btn-lg m-2">
                Pause
            </button>

            <button onclick="resetTimer()" class="btn btn-danger btn-lg m-2">
                Reset
            </button>

        </div>
    </div>

</div>

<script>
let time = 25 * 60;
let interval = null;

function updateDisplay() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerHTML =
        String(minutes).padStart(2, '0') + ":" + String(seconds).padStart(2, '0');
}

function startTimer() {
    if (interval !== null) {
        return;
    }

    interval = setInterval(function () {
        if (time <= 0) {
            clearInterval(interval);
            interval = null;
            alert("Pomodoro completed! Take a break.");
            return;
        }

        time--;
        updateDisplay();
    }, 1000);
}

function pauseTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {
    clearInterval(interval);
    interval = null;
    time = 25 * 60;
    updateDisplay();
}
</script>

</body>
</html>
