<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Focus Score</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Focus Score Engine</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow text-center mb-4">
        <div class="card-body">
            <h1>🎯 Focus Score Engine</h1>
            <p class="text-muted">
                Focus Score is calculated based on topic completion,
                schedule planning, and reminder usage.
            </p>

            <h1 class="display-1 text-primary">
                <span th:text="${focusScore}"></span>%
            </h1>

            <div class="progress mt-4" style="height: 30px;">
                <div class="progress-bar"
                     role="progressbar"
                     th:style="'width:' + ${focusScore} + '%'"
                     th:text="${focusScore} + '%'">
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow text-center border-success">
                <div class="card-body">
                    <h4>Completion Score</h4>
                    <h2><span th:text="${completionScore}"></span>/60</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center border-warning">
                <div class="card-body">
                    <h4>Schedule Score</h4>
                    <h2><span th:text="${scheduleScore}"></span>/25</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center border-info">
                <div class="card-body">
                    <h4>Reminder Score</h4>
                    <h2><span th:text="${reminderScore}"></span>/15</h2>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
