<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Achievement Badges</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Achievement Badges</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">🏅 Achievement Badges</h1>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h3>📚 First Subject Created</h3>
                    <p>Create at least one subject.</p>
                    <h4 th:text="${firstSubjectBadge ? '🏅 Unlocked' : '🔒 Locked'}"></h4>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h3>📝 Topic Starter</h3>
                    <p>Add at least 3 study topics.</p>
                    <h4 th:text="${topicStarterBadge ? '🏅 Unlocked' : '🔒 Locked'}"></h4>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h3>🗓 Smart Planner</h3>
                    <p>Create at least 3 study schedules.</p>
                    <h4 th:text="${plannerBadge ? '🏅 Unlocked' : '🔒 Locked'}"></h4>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body">
                    <h3>🔔 Reminder Master</h3>
                    <p>Add at least one reminder.</p>
                    <h4 th:text="${reminderBadge ? '🏅 Unlocked' : '🔒 Locked'}"></h4>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
