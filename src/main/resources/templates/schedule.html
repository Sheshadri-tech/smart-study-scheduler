<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Schedule Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Smart Schedule Builder</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow mb-4">
        <div class="card-header bg-warning">
            <h4>Auto Generate Priority-Based Schedule</h4>
        </div>

        <div class="card-body">
            <p>
                Automatically generates study sessions based on topic priority score,
                difficulty, estimated hours, and target completion date.
            </p>

            <form action="/schedule/auto-generate" method="post">
                <button type="submit" class="btn btn-warning">
                    Auto Generate Schedule
                </button>
            </form>
        </div>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            <h4>Add Manual Study Schedule</h4>
        </div>

        <div class="card-body">
            <form action="/schedule/add" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Topic</label>
                        <select name="topicId" class="form-select" required>
                            <option th:each="topic : ${topics}"
                                    th:value="${topic.id}"
                                    th:text="${topic.topicName}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Study Date</label>
                        <input type="date" name="studyDate" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Start Time</label>
                        <input type="time" name="startTime" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">End Time</label>
                        <input type="time" name="endTime" class="form-control" required>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Notes</label>
                        <input type="text" name="notes" class="form-control" placeholder="Enter notes">
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">Add Schedule</button>

            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4>All Study Schedules</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Topic</th>
                        <th>Priority</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="schedule : ${schedules}">
                        <td th:text="${schedule.studyDate}"></td>
                        <td>
                            <span th:text="${schedule.startTime}"></span>
                            -
                            <span th:text="${schedule.endTime}"></span>
                        </td>
                        <td th:text="${schedule.topic != null ? schedule.topic.topicName : 'No Topic'}"></td>
                        <td th:text="${schedule.topic != null ? schedule.topic.priorityScore : 0}"></td>
                        <td th:text="${schedule.notes}"></td>
                        <td>
                            <a th:href="@{/schedule/delete/{id}(id=${schedule.id})}" class="btn btn-danger btn-sm">
                                Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
