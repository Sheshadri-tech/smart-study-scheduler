<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Weekly Study Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark no-print">
    <div class="container-fluid">
        <span class="navbar-brand">Weekly Study Report</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">📄 Weekly Study Report</h1>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card text-center border-primary">
                        <div class="card-body">
                            <h5>Total Topics</h5>
                            <h2 th:text="${totalTopics}"></h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center border-success">
                        <div class="card-body">
                            <h5>Completed Topics</h5>
                            <h2 th:text="${completedTopics}"></h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center border-warning">
                        <div class="card-body">
                            <h5>Pending Topics</h5>
                            <h2 th:text="${pendingTopics}"></h2>
                        </div>
                    </div>
                </div>

            </div>

            <hr>

            <h4>Completion Percentage</h4>

            <div class="progress mb-4" style="height: 30px;">
                <div class="progress-bar"
                     role="progressbar"
                     th:style="'width:' + ${completionPercentage} + '%'"
                     th:text="${completionPercentage} + '%'">
                </div>
            </div>

            <div class="row g-4">

                <div class="col-md-4">
                    <h5>Total Study Schedules</h5>
                    <p th:text="${totalSchedules}"></p>
                </div>

                <div class="col-md-4">
                    <h5>Total Reminders</h5>
                    <p th:text="${totalReminders}"></p>
                </div>

                <div class="col-md-4">
                    <h5>Highest Priority Topic</h5>
                    <p th:text="${highestPriorityTopicName}"></p>
                </div>

            </div>

            <div class="text-center mt-4 no-print">
                <button onclick="window.print()" class="btn btn-primary">
                    Print / Save as PDF
                </button>
            </div>

        </div>
    </div>

</div>

<style>
@media print {
    .no-print {
        display: none;
    }
}
</style>

</body>
</html>
