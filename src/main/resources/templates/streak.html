<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Streak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Study Streak Tracker</span>
        <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow text-center">
        <div class="card-body">

            <h1 class="mb-4">🔥 Study Streak Tracker</h1>

            <div class="row">

                <div class="col-md-4">
                    <div class="card border-success mb-3">
                        <div class="card-body">
                            <h5>Current Streak</h5>
                            <h2>
                                <span th:text="${streak.currentStreak}"></span> Days
                            </h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-warning mb-3">
                        <div class="card-body">
                            <h5>Longest Streak</h5>
                            <h2>
                                <span th:text="${streak.longestStreak}"></span> Days
                            </h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card border-info mb-3">
                        <div class="card-body">
                            <h5>Last Study Date</h5>
                            <h2>
                                <span th:text="${streak.lastStudyDate}"></span>
                            </h2>
                        </div>
                    </div>
                </div>

            </div>

            <a href="/streak/update" class="btn btn-success btn-lg mt-3">
                Mark Today as Studied
            </a>

        </div>
    </div>

</div>

</body>
</html>
